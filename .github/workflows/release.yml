name: Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test --workspace @algorandfoundation/astro-github-loader
      - run: npm run build --workspace @algorandfoundation/astro-github-loader
      - run: npm publish --workspace packages/astro-github-loader --provenance --access public
